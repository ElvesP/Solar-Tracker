{% load static %}

<link rel="stylesheet" href="{% static 'css/reports.css' %}">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<div class="page" id="page-reports">
  <!-- HEADER -->
  <div class="header">
    <h1>Históricos e <br> relatórios</h1>

    <div class="date-range">
      <input type="date" value="2026-05-03">
      <input type="date" value="2023-04-05">
    </div>
  </div>

  <!-- MAIN -->
  <div class="container">

    <!-- GRÁFICO -->
    <div class="card chart-card">
      <div class="chart-header">
        <div class="chart-title">
          <p class="subtitle">GERAÇÃO DE ENERGIA</p>
          <h2>Última Semana (kWh)</h2>
        </div>
        <div class="chart-header">
          <select id="rangeSelect">
            <option value="week" selected>Semana</option>
            <option value="month">Mês</option>
            <option value="year">Ano</option>
          </select>
        </div>
      </div>

      <canvas id="energyChart"></canvas>
    </div>

    <!-- LADO DIREITO -->
    <div class="side">

      <div class="card total">
        <p class="subtitle">TOTAL GERADO (SEMANAL)</p>
        <h2>4,821.4 kWh</h2>
        <span class="positive">+8% vs semana anterior</span>
      </div>

      <div class="card insights">
        <h3>Performance Insights</h3>
        <ul>
          <li>✔ Eficiência aumentada em 12%</li>
          <li>✔ Melhor que o desempenho médio</li>
          <li>☀ Previsão: Sol intenso</li>
        </ul>
      </div>
    </div>
  </div>

<script src="{% static 'js/reports.js' %}"></script>
</div>

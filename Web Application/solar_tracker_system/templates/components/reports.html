{% load static %}

<link rel="stylesheet" href="{% static 'css/reports.css' %}">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<div class="page" id="page-reports">
  <!-- HEADER -->
  <div class="header">
    <h1>Históricos e <br> relatórios</h1>
  </div>

  <div class="container">
    <!-- GRÁFICO -->
    <div class="card chart-card">
      <div class="chart-header">
        <div class="chart-title">
          <p class="subtitle">GERAÇÃO DE ENERGIA</p>
          <h2>Última Semana (kWh)</h2>
        </div>
        <div class="chart-header">
          <select id="rangeSelect">
            <option value="week" selected>Semana</option>
            <option value="month">Mês</option>
            <option value="year">Ano</option>
          </select>
        </div>
      </div>
      <div class="chart-container">
        <canvas id="energyChart"></canvas>
      </div>
    </div>

    <!-- LADO DIREITO -->
    <div class="side">
      
      <div class="choices-container">
        <div class="chart-header">
          <select id="rangeSelectData">
            <option value="month">Energia</option>
            <option value="year">Eficiência de rastreamento</option>
          </select>
        </div>
        <div class="date-range cls">
          <input id="date-report" type="date" value="2026-04-05">
          <button class="data-submit">Executar</button>
        </div>
      </div>

      <div class="card total">
        <p class="subtitle">TOTAL GERADO (Dia)</p>
        <h2>4,821.4 kWh</h2>
        <span class="positive">+8% vs dia anterior</span>
      </div>

      <div class="card insights">
        <h3>Insights de desempenho do dia</h3>
        <ul>
          <li>Energia gerada 65,765.8 kWh</li>
          <li>Eficiência de rastreamento médio de 92%</li>
          <li>Luminosidade média 2000Lux</li>
        </ul>
      </div>
    </div>
  </div>
</div>

<script src="{% static 'js/reports.js' %}"></script>

{% load static %}

<link rel="stylesheet" href="{% static 'css/reports.css' %}">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<div class="page" id="page-reports">
  <!-- HEADER -->
  <div class="header">
    <h1>Históricos e relatórios</h1>
  </div>

  <div class="container">
    <!-- GRÁFICO -->
    <div class="card chart-card">
      <div class="chart-header">
        <div class="chart-title">
          <p class="subtitle">GERAÇÃO DE ENERGIA</p>
          <h2>--</h2>
        </div>
        <div class="chart-header">
          <select id="rangeSelectData">
            <option value="energy">Energia</option>
            <option value="avg_luminosity">Luminosidade média</option>
            <option value="tracking_efficiency">Eficiência de rastreamento</option>
          </select>
        </div>
      </div>
      <div class="chart-container">
        <canvas id="energyChart"></canvas>
      </div>
    </div>

    <!-- LADO DIREITO -->
    <div class="side">
      
      <div class="choices-container">
        <div class="chart-header">
          <select id="rangeSelect">
            <option value="week" selected>Semana</option>
            <option value="month">Mês</option>
            <option value="year">Ano</option>
          </select>
          <div class="date-range cls">
            <input id="date-report" type="date" value="2026-04-05">
          </div>
        </div>
        <button class="data-submit" id="data-submit-btn2">Executar</button>
      </div>

      <div class="card total">
        <p class="subtitle">TOTAL GERADO (DATA SELECCIONADA)</p>
        <h2>--</h2>
      </div>

      <div class="card insights">
        <h3>Insights de desempenho</h3>
        <span class="subtitle" id="insightSubtitle">--</span>
        <ul>
          <li>Sem dados históricos</li>
        </ul>
      </div>
    </div>
  </div>
</div>

<script src="{% static 'js/reports.js' %}" defer></script>

{% load static %}
<link rel="stylesheet" href="{% static 'css/control.css' %}">

<div class="page" id="page-control">
  <div style="margin-bottom:22px; color: #fff;">
    <h1 class="ptitle">Controle Remoto</h1>
  </div>

  <div class="card mode-card" style="margin-bottom:18px">
    <div class="header-left">
      <div class="label">Modo de Operação</div>
      <h1 id="headerTitle">Sistema em Modo Automático</h1>
    </div>
    <div class="mode-toggle">
      <div class="status-dot" id="statusDot"></div>
      <div class="btn-container">
        <button class="mode-btn active" id="btnAuto" onclick="setMode('auto')">AUTOMÁTICO</button>
        <button class="mode-btn" id="btnManual" onclick="setMode('manual')">MANUAL</button>
      </div>
    </div>
  </div>

  <div class="ctrl-g">
    <div class="card control-painel">
      <div class="panel-header">
        <div class="panel-title">Controle de Movimento (Manual)</div>
        <div class="readings">
          <div class="reading" id="readAz">AZIMUTE: 145.2°</div>
          <div class="reading" id="readEl">ELEVAÇÃO: 42.8°</div>
        </div>
      </div>

      <div class="controls-row">
        <!-- Joystick -->
        <div class="joystick-wrap">
          <div class="joy-row">
            <div style="width:44px"></div>
            <button class="joy-btn" id="joyUp" onmousedown="startMove('up')" onmouseup="stopMove()" onmouseleave="stopMove()" ontouchstart="startMove('up')" ontouchend="stopMove()">▲</button>
            <div style="width:44px"></div>
          </div>
          <div class="joy-row">
            <button class="joy-btn" id="joyLeft" onmousedown="startMove('left')" onmouseup="stopMove()" onmouseleave="stopMove()" ontouchstart="startMove('left')" ontouchend="stopMove()">◀</button>
            <div class="joy-center" title="Centralizar" onclick="centerAxes()">⊕</div>
            <button class="joy-btn" id="joyRight" onmousedown="startMove('right')" onmouseup="stopMove()" onmouseleave="stopMove()" ontouchstart="startMove('right')" ontouchend="stopMove()">▶</button>
          </div>
          <div class="joy-row">
            <div style="width:44px"></div>
            <button class="joy-btn" id="joyDown" onmousedown="startMove('down')" onmouseup="stopMove()" onmouseleave="stopMove()" ontouchstart="startMove('down')" ontouchend="stopMove()">▼</button>
            <div style="width:44px"></div>
          </div>
        </div>

        <!-- Sliders -->
        <div class="sliders-wrap">
          <div class="slider-group">
            <div class="slider-label">Eixo Horizontal</div>
            <div class="slider-track-wrap">
              <button class="slider-side" onclick="nudge('az',-1)">−</button>
              <input type="range" id="sliderAz" min="0" max="360" value="145.2" step="0.1" oninput="onSliderAz(this.value)">
              <button class="slider-side" onclick="nudge('az',1)">+</button>
            </div>
          </div>
          <div class="slider-group">
            <div class="slider-label">Eixo Vertical</div>
            <div class="slider-track-wrap">
              <button class="slider-side" onclick="nudge('el',-1)">−</button>
              <input type="range" id="sliderEl" min="0" max="90" value="42.8" step="0.1" oninput="onSliderEl(this.value)">
              <button class="slider-side" onclick="nudge('el',1)">+</button>
            </div>
          </div>
        </div>
      </div>

      <button class="calibrate-btn" id="calibBtn" onclick="calibrate()">Calibrar Posição</button>
    </div>

    <div class="card">
      <div class="side-card-title">Visualização 3D</div>
      <div class="viz-3d">
        <canvas id="antenaCanvas" width="220" height="220"></canvas>
      </div>
    </div>
  </div>
</div>

<script src="{% static 'js/control.js' %}" defer></script>
